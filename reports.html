<!DOCTYPE html>
<html>
<head>
<title>Admin Reports - Plant Store</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:
    linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)),
    url("https://images.unsplash.com/photo-1466692476868-aef1dfb1e735");
  background-size:cover;
}

/* SIDEBAR */
.sidebar{
  width:220px;
  height:100vh;
  background:#2e7d32;
  position:fixed;
  color:white;
}
.sidebar h2{
  text-align:center;
  padding:15px;
  margin:0;
  border-bottom:1px solid #fff;
}
.sidebar a{
  display:block;
  padding:15px;
  color:white;
  text-decoration:none;
}
.sidebar a:hover{
  background:#1b5e20;
}

/* MAIN */
.main{
  margin-left:220px;
  padding:20px;
  background:rgba(255,255,255,0.95);
  min-height:100vh;
}

h1{margin-top:0;}

/* CARDS */
.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
  gap:20px;
  margin:20px 0;
}
.card{
  background:white;
  padding:20px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,.2);
  text-align:center;
}
.card span{
  font-size:28px;
  color:#2e7d32;
  font-weight:bold;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
  margin-top:20px;
  background:white;
}
th,td{
  border:1px solid #ccc;
  padding:10px;
  text-align:center;
}
th{
  background:#2e7d32;
  color:white;
}

/* IMAGE */
.plantimg{
  width:60px;
  height:60px;
  border-radius:8px;
  object-fit:cover;
}

/* LOW STOCK */
.low{
  color:red;
  font-weight:bold;
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Admin Panel</h2>
  <a href="admin dashboard.html">🏠 Dashboard</a>
  <a href="manage plants.html">🌱 Manage Plants</a>
  <a href="stock.html">📦 Stock</a>
  <a href="orders.html">🧾 Orders</a>
  <a href="reports.html">📊 Reports</a>
  <a href="admin login.html">🚪 Logout</a>
</div>

<!-- MAIN -->
<div class="main">

<h1>📊 Reports</h1>

<div class="cards">
  <div class="card">
    Total Orders<br>
    <span id="totalOrders">0</span>
  </div>

  <div class="card">
    Approved / Delivered<br>
    <span id="approvedOrders">0</span>
  </div>

  <div class="card">
    Total Revenue (₹)<br>
    <span id="totalRevenue">0</span>
  </div>

  <div class="card">
    Low Stock Plants<br>
    <span id="lowStock">0</span>
  </div>
</div>

<!-- SALES -->
<h2>📦 Sales Report</h2>

<table>
<thead>
<tr>
<th>Order ID</th>
<th>Customer</th>
<th>Plant</th>
<th>Qty</th>
<th>Total ₹</th>
<th>Status</th>
</tr>
</thead>

<tbody id="salesTable"></tbody>

</table>

<!-- STOCK -->
<h2>🌿 Stock Report</h2>

<table>
<thead>
<tr>
<th>Plant Name</th>
<th>Category</th>
<th>Price ₹</th>
<th>Stock</th>
</tr>
</thead>

<tbody id="stockTable"></tbody>

</table>

</div>

<script>

// GET DATA
let orders = JSON.parse(localStorage.getItem("orders")) || [];
let plants = JSON.parse(localStorage.getItem("plants")) || [];

// SUMMARY
let totalOrders = orders.length;
let approvedOrders = 0;
let revenue = 0;

orders.forEach(o=>{
  let status = (o.status || "").toLowerCase();

  if(status === "approved" || status === "delivered"){
    approvedOrders++;
    revenue += Number(o.total || 0);
  }
});

document.getElementById("totalOrders").innerText = totalOrders;
document.getElementById("approvedOrders").innerText = approvedOrders;
document.getElementById("totalRevenue").innerText = revenue;


// SALES TABLE ✅
let salesTable = document.getElementById("salesTable");
salesTable.innerHTML = "";

if(orders.length === 0){
  salesTable.innerHTML = "<tr><td colspan='6'>No Orders</td></tr>";
}

orders.forEach((o,i)=>{

  salesTable.innerHTML += `
  <tr>
    <td>ORD${i+1}</td>

    <td>${o.user || "Guest"}</td>

    <td>
      <img src="${o.image}" class="plantimg"><br>
      ${o.name || "-"}
    </td>

    <td>${o.qty || 1}</td>

    <td>${o.total || 0}</td>

    <td>${o.status || "Pending"}</td>
  </tr>
  `;
});


// STOCK TABLE
let stockTable = document.getElementById("stockTable");
stockTable.innerHTML = "";

let lowStockCount = 0;

plants.forEach(p=>{

  if(Number(p.stock) <= 5){
    lowStockCount++;
  }

  stockTable.innerHTML += `
  <tr>
    <td>${p.name}</td>
    <td>${p.category}</td>
    <td>${p.price}</td>
    <td class="${Number(p.stock)<=5?'low':''}">
      ${p.stock}
    </td>
  </tr>
  `;
});

document.getElementById("lowStock").innerText = lowStockCount;

</script>

</body>
</html>
