<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login | Plant Store</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Segoe UI, sans-serif;
}

/* ===== BACKGROUND ===== */
body{
    height:100vh;
    background:
    linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)),
    url("https://images.unsplash.com/photo-1492496913980-501348b61469");
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
}

/* ===== LOGIN BOX ===== */
.login-box{
    width:320px;
    padding:30px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(12px);
    border-radius:12px;
    text-align:center;
    color:white;
    box-shadow:0 8px 25px rgba(0,0,0,0.3);
}

.login-box h2{
    margin-bottom:20px;
    letter-spacing:1px;
}

/* ===== INPUTS ===== */
.login-box input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:6px;
    outline:none;
    font-size:14px;
}

/* ===== BUTTON ===== */
.login-box button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#2e7d32;
    color:white;
    border:none;
    border-radius:6px;
    font-size:16px;
    cursor:pointer;
}

.login-box button:hover{
    background:#1b5e20;
}

/* ===== MESSAGE ===== */
#msg{
    margin-top:12px;
    font-size:14px;
    color:#ffeb3b;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>🌱 Admin Login</h2>

    <input type="text" id="username" placeholder="Admin Username">
    <input type="password" id="password" placeholder="Admin Password">

    <button onclick="login()">Login</button>

    <p id="msg"></p>
</div>

<script>
function login(){
    var user = document.getElementById("username").value;
    var pass = document.getElementById("password").value;
    var msg  = document.getElementById("msg");

    // demo admin credentials
    if(user === "admin" && pass === "1234"){
        msg.style.color = "#a5ff9e";
        msg.innerText = "Login Successful ✔";

        // redirect (demo)
        setTimeout(function(){
            window.location.href = "admin dashboard.html";
        }, 1000);
    }
    else{
        msg.style.color = "#ffcccb";
        msg.innerText = "Invalid Username or Password ❌";
    }
}
</script>

</body>
</html>
